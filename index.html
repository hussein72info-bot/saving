<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الادخار - نسخة احترافية</title>

<style>
:root{
--primary:#1a2a6c;
--success:#10b981;
--error:#ef4444;
--bg:#eef2f7;
}

body{margin:0;font-family:tahoma;background:var(--bg);}

/* HEADER */
header{
background:var(--primary);
color:#fff;
padding:10px;
text-align:center;
}

/* STATS */
#stats{
display:flex;
justify-content:space-around;
background:#fff;
padding:8px;
font-size:14px;
}

/* ITEMS */
#panel{
display:flex;
flex-wrap:wrap;
gap:6px;
padding:10px;
background:#2b3a8a;
}

.item{
background:#fff;
padding:6px;
border-radius:6px;
flex:1 1 30%;
text-align:center;
cursor:pointer;
font-size:13px;
}

.item.selected{background:orange;color:#fff;}

/* GAME */
#game{padding:10px;}

.central{
background:var(--primary);
color:#fff;
padding:10px;
border-radius:10px;
text-align:center;
margin-bottom:10px;
}

.box{
background:#fff;
margin-bottom:10px;
padding:10px;
border-radius:10px;
}

.drop{
min-height:50px;
border:2px dashed #ccc;
padding:5px;
border-radius:6px;
}

.placed{
background:var(--success);
color:#fff;
margin:3px;
padding:4px;
border-radius:5px;
display:inline-block;
font-size:12px;
}

/* RESULT */
#result{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
color:#fff;
flex-direction:column;
font-size:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:var(--primary);
color:#fff;
margin-top:10px;
}
</style>
</head>

<body>

<header>
لعبة خريطة الادخار
</header>

<div id="stats">
<div>⏱ الوقت: <span id="time">60</span></div>
<div>✅ صح: <span id="correct">0</span></div>
<div>❌ خطأ: <span id="wrong">0</span></div>
<div>⭐ نقاط: <span id="score">0</span></div>
</div>

<div id="panel"></div>

<div id="game">

<div class="central">
مفهوم الادخار<br>
<span style="font-size:12px">الاحتفاظ بالمال لتحقيق أهداف مستقبلية</span>
</div>

<div class="box" data-cat="imp"><b>أهمية الادخار</b><div class="drop"></div></div>
<div class="box" data-cat="step"><b>خطوات الادخار</b><div class="drop"></div></div>
<div class="box" data-cat="type"><b>أنواع الادخار</b><div class="drop"></div></div>
<div class="box" data-cat="form"><b>أشكال الادخار</b><div class="drop"></div></div>
<div class="box" data-cat="sec"><b>أقسام الادخار</b><div class="drop"></div></div>
<div class="box" data-cat="meth"><b>طرائق الادخار</b><div class="drop"></div></div>

</div>

<div id="result">
<div id="finalText"></div>
<button onclick="restart()">إعادة اللعب</button>
</div>

<script>
let selected=null;
let correct=0,wrong=0,score=0,time=60;

const items=[
{id:1,text:'تحقيق الأهداف',cat:'imp'},
{id:2,text:'تجنب الدين',cat:'imp'},
{id:3,text:'الأمان المالي',cat:'imp'},

{id:4,text:'تحديد الهدف',cat:'step'},
{id:5,text:'حساب التكلفة',cat:'step'},

{id:6,text:'الادخار للشراء',cat:'type'},
{id:7,text:'الادخار للتقاعد',cat:'type'},

{id:8,text:'الادخار المالي',cat:'form'},
{id:9,text:'ادخار الموارد',cat:'form'},

{id:10,text:'اختياري',cat:'sec'},
{id:11,text:'إجباري',cat:'sec'},

{id:12,text:'تقليدي',cat:'meth'},
{id:13,text:'رقمي',cat:'meth'}
];

function init(){
let panel=document.getElementById("panel");
panel.innerHTML="";

items.sort(()=>Math.random()-0.5).forEach(i=>{
let div=document.createElement("div");
div.className="item";
div.innerText=i.text;
div.dataset.cat=i.cat;

div.onclick=()=>{
document.querySelectorAll('.item').forEach(e=>e.classList.remove('selected'));
div.classList.add('selected');
selected=div;
};

panel.appendChild(div);
});
}

document.querySelectorAll(".box").forEach(box=>{
box.onclick=()=>{
if(!selected) return;

if(selected.dataset.cat===box.dataset.cat){
let el=document.createElement("div");
el.className="placed";
el.innerText=selected.innerText;

box.querySelector(".drop").appendChild(el);
selected.remove();

correct++;
score+=10;
playSound(true);

}else{
wrong++;
score-=5;
playSound(false);
}

update();
selected=null;
};
});

function update(){
document.getElementById("correct").innerText=correct;
document.getElementById("wrong").innerText=wrong;
document.getElementById("score").innerText=score;
}

function timer(){
let t=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;

if(time<=0){
clearInterval(t);
endGame();
}
},1000);
}

function endGame(){
document.getElementById("result").style.display="flex";
document.getElementById("finalText").innerText=
"انتهى الوقت\nالنقاط: "+score;
}

function restart(){
location.reload();
}

/* أصوات */
function playSound(correct){
let audio=new Audio(correct?
"https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3":
"https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"
);
audio.play();
}

init();
timer();
</script>

</body>
</html>
